name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm pack --workspace @autonomous-graph-engineering/prompt-refiner
      - run: npm pack --workspace @autonomous-graph-engineering/graph-engineer
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tgz"
