name: Bug report
description: Report a reproducible defect that is not a security vulnerability.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Do not disclose vulnerabilities or credentials here. Use private vulnerability reporting for security issues.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Prompt Refiner
        - Graph planner or validator
        - Runtime or checkpoint
        - Codex executor
        - Claude executor
        - MCP
        - HTTP
        - Plugin or installer
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Remove credentials, private prompts, checkpoints, and workspace data.
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Relevant logs and checks
      description: Paste redacted output and the commands you ran.
