name: Feature request
description: Propose a scoped improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: invariants
    attributes:
      label: Safety and compatibility impact
      description: Address permissions, gates, budgets, persistence, and public contracts.
    validations:
      required: true
